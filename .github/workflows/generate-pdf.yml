name: Generate PDF

on:
  push:
    branches: [main]
    paths:
      - resume.md
      - resume.json
      - index.html

jobs:
  pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Generate resume.pdf from markdown
        run: md-to-pdf resume.md --output resume.pdf

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate resume.pdf"
          file_pattern: resume.pdf
