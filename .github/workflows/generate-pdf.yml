name: Generate PDF

on:
  push:
    branches: [main]
    paths:
      - resume.json
      - template.html
      - build.js

jobs:
  pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build index.html from resume.json + template
        run: node build.js

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate resume.pdf from index.html
        run: |
          node -e "
            const puppeteer = require('puppeteer');
            const path = require('path');
            (async () => {
              const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
              const page = await browser.newPage();
              await page.goto('file://' + path.resolve('index.html'), { waitUntil: 'networkidle0' });
              await page.pdf({ path: 'resume.pdf', format: 'Letter', printBackground: true });
              await browser.close();
            })();
          "

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate index.html and resume.pdf"
          file_pattern: index.html resume.pdf
